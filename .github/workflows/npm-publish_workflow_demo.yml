name: CI

on:
  push:
    branches: [main, 'feature/**']
    paths-ignore: ['**.md', 'docs/**']

  pull_request:
    branches: [main]

  schedule:
    - cron: '0 6 * * *'

  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version'
        required: false
        default: '20'
        type: choice
        options: ['18', '20', '22']
      run_coverage:
        description: 'Generate coverage report'
        required: false
        default: true
        type: boolean
      environment:
        description: 'Target environment'
        required: false
        default: 'development'
        type: string

  repository_dispatch:
    types: [build-and-test, deploy-trigger]

env:
  NODE_ENV: ${{ github.event.inputs.environment || 'development' }}
  CI: true

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    outputs:
      node_version: ${{ steps.config.outputs.node_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure build
        id: config
        run: |
          echo "node_version=${{ github.event.inputs.node_version || '20' }}" >> $GITHUB_OUTPUT
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: node -e "const pkg = require('./package.json'); console.log('Building', pkg.name, 'v' + pkg.version);"

      - name: Run tests
        run: npm test

      - name: Generate coverage
        if: github.event.inputs.run_coverage == 'true' || github.event_name == 'pull_request' || github.event_name == 'schedule'
        run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        if: github.event.inputs.run_coverage == 'true' || github.event_name == 'pull_request' || github.event_name == 'schedule'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  compatibility:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build

    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4
     # passing inputs to the reusable workflow 
      - uses: actions/setup-node@v4  
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm test

  notify:
    name: Summary
    runs-on: ubuntu-latest
    # needs :[build] depicts that only after build is completed , this notify action will work . By default job execute in parallel
    needs: [build]
    if: always()

    steps:
      - name: Generate workflow summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node | ${{ needs.build.outputs.node_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
